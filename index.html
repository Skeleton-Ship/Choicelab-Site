<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Choicelab</title>
    <style type="text/css">
      :root {
        color-scheme: dark;
      }
      html {
        font-size: clamp(16px, 2vw, 22px);
      }
      body {
        margin: 0;
        background-color: #232328;
        color: white;
        font-family: system-ui, sans-serif;
      }
      main {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        max-width: 600px;
        transform: translate(-50%, -50%);
      }
      p {
        text-align: center;
        line-height: 1.6;
      }
      #app-icon {
        width: 13rem;
        height: auto;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      #download-link:empty {
        display: none;
      }
      #download-link {
        display: inline-block;
        text-decoration: none;
        padding: 0.4rem 2rem;
        border-radius: 99px;
        font-size: 1.4rem;
        background-color: #4d41ef;
        color: white;
        font-weight: 600;
        transform: scale(1);
        transition: transform 0.2s ease;
        &:hover {
          transform: scale(1.04);
        }
      }
      #release-info {
        color: #9895bf;
        font-style: italic;
        font-size: 0.7rem;
        overflow-wrap: break-word;
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("https://releases.choicelab.xyz/latest/latest.json", {
          method: "GET",
          mode: "cors",
        })
          .then((response) => response.json())
          .then((data) => {
            console.log(data);
            // Add download button
            const link = document.getElementById("download-link");
            link.innerText = "Download Choicelab";
            const downloadUrl = data.platforms["darwin-aarch64"].url;
            const downloadSignature =
              data.platforms["darwin-aarch64"].signature;
            if (downloadUrl !== "") {
              link.setAttribute("href", downloadUrl);
            }
            // Format date
            const info = document.getElementById("release-info");
            const date = new Date(data.pub_date).toLocaleDateString("en-US", {
              month: "long",
              day: "2-digit",
              year: "numeric",
            });
            info.innerText = `for macOS 14+\nv${data.version} – ${date}`;
          });
      });
    </script>
  </head>
  <body>
    <main>
      <img id="app-icon" src="./app-icon.png" alt="Choicelab icon" />
      <p><a id="download-link"></a></p>
      <p id="release-info"></p>
    </main>
  </body>
</html>
